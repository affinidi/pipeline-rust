on:
  workflow_call:
    inputs:
      toolchain:
        required: false
        type: string
        default: stable
      rustflags:
        required: false
        type: string
        default: ""
      ubuntu-rust-deps:
        required: false
        type: string
        default: libdbus-1-dev libssl-dev
      release_dry_run:
        required: false
        type: boolean
        default: true
      release_debug:
        required: false
        type: boolean
        default: false
      release_max_retries:
        required: false
        type: number
        default: 10
      auditIgnore:
        required: false
        type: string
        default: ""
      repo-path:
        required: false
        type: string
        default: "."
      workspace_publish:
        description: "Use cargo publish --workspace (requires Rust 1.90+, path deps, workspace inheritance)"
        required: false
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: crates.io access token
        required: false
jobs:
  rust-scan:
    uses: affinidi/pipeline-security/.github/workflows/rust-scanner.yml@main
    with:
      repo-path: ${{ inputs.repo-path }}
    secrets: inherit

  release:
    needs: [rust-scan]
    runs-on: ubuntu-24.04
    environment: "release"
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: write
    steps:
      # - name: Free Disk Space (Ubuntu)
      #   uses: insightsengineering/disk-space-reclaimer@v1
      #   with:
      #     tools-cache: true

      # https://github.com/actions/create-github-app-token
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          # app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: configure git
        run: |
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          rustflags: ${{ inputs.rustflags }}
          override: true

      - uses: affinidi/pipeline-rust/.github/actions/rust-dependencies@main
        with:
          ubuntu-rust-deps: ${{ inputs.ubuntu-rust-deps }}

      - name: Build project
        run: cargo build --release

      - name: Authenticate to crates.io (OIDC trusted publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
        continue-on-error: true  # falls back to CARGO_REGISTRY_TOKEN secret if trusted publisher not configured

      # - name: Release
      #   if: ${{ github.ref == 'refs/heads/main' }}
      #   run: |
      #     if ! cargo release --version; then
      #       cargo install cargo-release
      #     fi
      #     # '--verbose' was moved to the condition as if yes is '' in 'condition && yes || no' then no is picked (as condition && '' is false)
      #     cargo release --no-confirm --workspace ${{ inputs.release_dry_run && '--verbose --unpublished' || '--verbose --unpublished --execute' }}
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # --- workspace publish path (cargo publish --workspace) ---
      # `cargo publish --workspace` errors on the first crate whose current
      # version is already on crates.io instead of skipping it, which blocks
      # targeted patch releases that only bump a subset of workspace members.
      # This step compares the local manifest version against the registry
      # for every publishable crate, builds an `--exclude` list for matches,
      # and signals when nothing is left to publish.
      - name: Plan workspace publish (skip already-published crates)
        id: workspace-publish-plan
        if: ${{ github.ref == 'refs/heads/main' && inputs.workspace_publish }}
        run: |
          set -euo pipefail
          debug="${{ inputs.release_debug }}"
          exclude_args=""
          skipped=()
          publishable=()

          while IFS=$'\t' read -r name version; do
              remote_version=""
              if info_output=$(cargo info --registry crates-io --color never "${name}" 2>/dev/null); then
                  remote_version=$(printf '%s\n' "${info_output}" | awk '/^version:/ { print $2; exit }')
              fi

              if [[ "${debug}" == "true" ]]
              then
                  echo "  ${name}: local=${version} remote=${remote_version:-<not published>}"
              fi

              if [[ -n "${remote_version}" && "${remote_version}" == "${version}" ]]
              then
                  exclude_args+=" --exclude ${name}"
                  skipped+=("${name}@${version}")
              else
                  publishable+=("${name}@${version}")
              fi
          done < <(cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[] | select(.publish != []) | [.name, .version] | @tsv')

          echo ""
          echo "=== Workspace publish plan ==="
          if [[ ${#publishable[@]} -gt 0 ]]
          then
              echo "Will publish (${#publishable[@]}):"
              printf '  - %s\n' "${publishable[@]}"
          else
              echo "Nothing to publish — every publishable workspace crate is already at its registry version."
          fi
          if [[ ${#skipped[@]} -gt 0 ]]
          then
              echo "Already on crates.io, skipping (${#skipped[@]}):"
              printf '  - %s\n' "${skipped[@]}"
          fi

          {
              echo "exclude_args=${exclude_args}"
              echo "publishable_count=${#publishable[@]}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish workspace
        if: ${{ github.ref == 'refs/heads/main' && inputs.workspace_publish && steps.workspace-publish-plan.outputs.publishable_count != '0' }}
        run: cargo publish --workspace${{ steps.workspace-publish-plan.outputs.exclude_args }}${{ inputs.release_dry_run && ' --dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

      - name: Tag published crates
        if: ${{ github.ref == 'refs/heads/main' && inputs.workspace_publish && !inputs.release_dry_run }}
        run: |
          for pkg in $(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish != []) | "\(.name)@\(.version)"'); do
            name="${pkg%%@*}"
            version="${pkg##*@}"
            tag="${name}-v${version}"
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              git tag --annotate "$tag" --message="Release ${name} v${version}"
              echo "Tagged: $tag"
            fi
          done

      # --- legacy per-crate publish path (pre-1.90 or no workspace inheritance) ---
      - name: Release (legacy)
        if: ${{ github.ref == 'refs/heads/main' && !inputs.workspace_publish }}
        run: |
          debug="${{ inputs.release_debug }}"
          max_retries=${{ inputs.release_max_retries }}
          retries=0
          all_published_crates=()
          published_crates=()
          failed_crates=()

          while [[ ${#published_crates[@]} -gt 0 || ${#failed_crates[@]} -gt 0 || $retries == 0 ]]
          do
              if [[ $retries == $max_retries ]]
              then
                  echo "Max retries (${max_retries}) reached, exiting."
                  if [[ ${#failed_crates[@]} -gt 0 ]]
                  then
                      echo "Creates published in the current run: [${all_published_crates[@]}]."
                      echo "Crates which were not published: [${failed_crates[@]}]."
                  fi
                  exit 1
              elif [[ $retries -gt 0 ]]
              then
                  if [[ ${#failed_crates[@]} -eq 0 ]]
                  then
                      echo "Seems all crates were published."
                      break
                  fi
              fi
              retries=$((retries + 1))
              if [[ $retries -gt 1 ]]
              then
                  echo "[${retries}/${max_retries}] Creates published in the previous run: [${published_crates[@]}]"
                  echo "[${retries}/${max_retries}] Creates failed in the previous run: [${failed_crates[@]}]"
              fi
              published_crates=()
              failed_crates=()
              for crate in $(cargo metadata --format-version=1 --no-deps | jq -r '.packages[].manifest_path' | xargs dirname)
              do
                  if grep -q "publish = false" "${crate}/Cargo.toml"
                  then
                    echo "Skipping $crate..."
                    continue
                  fi

                  echo "Publishing crate $crate..."

                  crate_name=${crate##*/}
                  if [[ "${debug}" == "true" ]]
                  then
                      echo "crate_name=${crate_name}"
                  fi

                  if [[ "${debug}" == "true" ]]
                  then
                      cargo info ${crate_name} | grep "version" | grep --invert-match "rust-version" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "Cannot fetch remote version"
                  fi
                  local_version=$(cargo info ${crate_name} | grep "version" | grep --invert-match "rust-version" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
                  if [[ "${debug}" == "true" ]]
                  then
                      echo local_version=${local_version}
                  fi

                  if [[ "${debug}" == "true" ]]
                  then
                      cargo search --limit 1 --quiet ${crate_name} | grep --before-context=0 --after-context=0 ${crate_name} | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "Cannot fetch remote version"
                  fi
                  remote_version=$(cargo search --limit 1 --quiet ${crate_name} | grep --before-context=0 --after-context=0 ${crate_name} | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
                  if [[ "${debug}" == "true" ]]
                  then
                      echo remote_version=${remote_version}
                  fi

                  if [[ "${local_version}" != "${remote_version}" ]]
                  then
                      cd $crate
                      echo "Publishing ${crate_name}@${local_version}]..."
                      set +e
                      cargo publish ${{ inputs.release_dry_run && '--dry-run' || '' }}
                      publish_exit_code=$?
                      set -e
                      if [[ "$publish_exit_code" == "0" ]]
                      then
                          if [[ ! ${all_published_crates[@]} =~ $crate_name ]]
                          then
                              all_published_crates+=($crate_name)
                          fi
                          published_crates+=($crate_name)
                      else
                          failed_crates+=($crate_name)
                      fi
                      cd ..

                      tag_version="${crate_name}-v${local_version}"
                      git tag --annotate "${tag_version}" --message="Release tag for ${tag_version}" || echo "Tag [${tag_version}] already exists"
                  else
                      echo "No release needed for ${crate_name} as version [${remote_version}] was already released."
                  fi
              done
          done
          echo "Creates published in the current run: [${all_published_crates[@]}]."
          echo "Creates failed in the current run: [${failed_crates[@]}]."
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Push Tags
        run: git push --follow-tags

      - name: Check disk usage
        run: df -h
